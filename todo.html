<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>do. — task list</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #1f1f1f;
    --border-light: #2a2a2a;
    --text: #e8e4df;
    --text-muted: #4a4744;
    --text-dim: #2e2c2a;
    --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.12);
    --done: #303030;
    --done-text: #3a3835;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  .container {
    max-width: 580px;
    margin: 0 auto;
    padding: 80px 32px 120px;
    min-height: 100vh;
  }

  /* header */
  header {
    margin-bottom: 64px;
    animation: fadeUp 0.6s ease both;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    letter-spacing: -1px;
    color: var(--text);
    line-height: 1;
    display: block;
  }

  .wordmark em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* input area */
  .input-row {
    display: flex;
    gap: 0;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border-light);
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.03em;
    padding: 14px 0;
    caret-color: var(--accent);
  }

  .input-row input::placeholder {
    color: var(--text-dim);
  }

  .add-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 22px;
    line-height: 1;
    padding: 0 0 0 12px;
    transition: color 0.2s;
    display: flex;
    align-items: center;
  }

  .add-btn:hover { color: var(--accent); }

  /* filter tabs */
  .filters {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .filter-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0;
    transition: color 0.2s;
    position: relative;
  }

  .filter-btn.active {
    color: var(--accent);
  }

  .filter-btn.active::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0; right: 0;
    height: 1px;
    background: var(--accent);
  }

  /* task list */
  .tasks {
    list-style: none;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.3s ease both;
    position: relative;
    group: task;
  }

  .task-item:first-child {
    border-top: 1px solid var(--border);
  }

  /* custom checkbox */
  .check-wrap {
    flex-shrink: 0;
    margin-top: 1px;
    position: relative;
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  .check-wrap input {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
  }

  .checkmark {
    position: absolute;
    inset: 0;
    border: 1px solid var(--border-light);
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .checkmark svg {
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s ease;
    stroke: var(--accent);
  }

  .check-wrap:hover .checkmark {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .check-wrap input:checked ~ .checkmark {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .check-wrap input:checked ~ .checkmark svg {
    opacity: 1;
    transform: scale(1);
  }

  /* task text */
  .task-text {
    flex: 1;
    font-size: 13px;
    letter-spacing: 0.02em;
    line-height: 1.6;
    color: var(--text);
    transition: color 0.3s;
    word-break: break-word;
    padding-top: 1px;
  }

  .task-item.done .task-text {
    color: var(--done-text);
    text-decoration: line-through;
    text-decoration-color: var(--border-light);
  }

  .delete-btn {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1;
    padding: 0;
    transition: opacity 0.2s, color 0.2s;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .task-item:hover .delete-btn {
    opacity: 1;
  }

  .delete-btn:hover {
    color: #c0392b;
  }

  /* empty state */
  .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .empty span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-style: italic;
    display: block;
    margin-bottom: 10px;
    color: var(--border-light);
    font-weight: 300;
    letter-spacing: 0;
    text-transform: none;
  }

  /* footer stats */
  .stats {
    margin-top: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeUp 0.6s 0.25s ease both;
  }

  .stats-text {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .clear-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    transition: color 0.2s;
    padding: 0;
  }

  .clear-btn:hover { color: var(--text-muted); }

  /* animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .task-item.removing {
    animation: slideOut 0.25s ease forwards;
  }

  @keyframes slideOut {
    to { opacity: 0; transform: translateX(12px); height: 0; padding: 0; overflow: hidden; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="wordmark">do<em>.</em></span>
    <p class="subtitle">your tasks, simply</p>
  </header>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="add a new task…" autocomplete="off" />
    <button class="add-btn" id="addBtn" title="Add task">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>

  <ul class="tasks" id="taskList"></ul>

  <div class="empty" id="emptyState" style="display:none">
    <span>nothing here</span>
    add something above
  </div>

  <div class="stats">
    <span class="stats-text" id="statsText"></span>
    <button class="clear-btn" id="clearDone">clear done</button>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('do_tasks') || '[]');
  let filter = 'all';

  const taskList = document.getElementById('taskList');
  const taskInput = document.getElementById('taskInput');
  const addBtn = document.getElementById('addBtn');
  const emptyState = document.getElementById('emptyState');
  const statsText = document.getElementById('statsText');
  const clearDoneBtn = document.getElementById('clearDone');

  function save() {
    localStorage.setItem('do_tasks', JSON.stringify(tasks));
  }

  function render() {
    taskList.innerHTML = '';
    const visible = tasks.filter(t =>
      filter === 'all' ? true :
      filter === 'active' ? !t.done :
      t.done
    );

    if (visible.length === 0) {
      emptyState.style.display = 'block';
    } else {
      emptyState.style.display = 'none';
      visible.forEach(task => {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.done ? ' done' : '');
        li.dataset.id = task.id;
        li.innerHTML = `
          <label class="check-wrap">
            <input type="checkbox" ${task.done ? 'checked' : ''} data-id="${task.id}" />
            <span class="checkmark">
              <svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1,4 4,7 9,1"/>
              </svg>
            </span>
          </label>
          <span class="task-text">${escapeHtml(task.text)}</span>
          <button class="delete-btn" data-id="${task.id}" title="Delete">×</button>
        `;
        taskList.appendChild(li);
      });
    }

    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const active = total - done;
    statsText.textContent = active > 0
      ? `${active} remaining`
      : total > 0 ? 'all done ✦' : '';
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addTask() {
    const text = taskInput.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, done: false });
    taskInput.value = '';
    save();
    render();
  }

  taskList.addEventListener('change', e => {
    if (e.target.type === 'checkbox') {
      const id = +e.target.dataset.id;
      const t = tasks.find(t => t.id === id);
      if (t) { t.done = e.target.checked; save(); render(); }
    }
  });

  taskList.addEventListener('click', e => {
    const btn = e.target.closest('.delete-btn');
    if (!btn) return;
    const id = +btn.dataset.id;
    const li = taskList.querySelector(`[data-id="${id}"]`);
    if (li) {
      li.classList.add('removing');
      li.addEventListener('animationend', () => {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
      }, { once: true });
    }
  });

  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  clearDoneBtn.addEventListener('click', () => {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  });

  render();
</script>
</body>
</html>
